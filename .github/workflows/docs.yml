name: Deploy MkDocs Material Site

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 👇 Changed: install MkDocs and the Material theme
      - name: Install MkDocs Material
        run: pip install mkdocs mkdocs-material>=9.7.6 mkdocs-static-i18n

      # 👇 Changed: build with MkDocs (outputs to ./site by default)
      - name: Build Site
        run: mkdocs build --clean

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # automatically inject CORS headers
          enablement: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4