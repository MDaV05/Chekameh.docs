site_name: "چکامه"
site_url: "https://docs.chekameh.xyz"
site_description: "نقشه و خط زمانی تعاملی شعر فارسی — کاوش در شاعران، دوران‌ها و مراکز ادبی"
site_author: "Mohammad Davari"
docs_dir: "docs"
site_dir: "site"
repo_url: "https://github.com/MDaV05/PersianCultureMap"
repo_name: "گیت‌هاب"
language: fa

theme:
  name: material
  direction: rtl
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: grey
      toggle:
        icon: material/brightness-7
        name: حالت تاریک
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: حالت روشن
  features:
    - navigation.tabs
    - navigation.tracking
    - navigation.tabs.sticky
    - navigation.path
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.code.annotate
  font:
    text: Vazirmatn
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# Navigation - Farsi Only
nav:
  - 🏠 خانه: index.md
  - 📊 داده‌ها:
        - 📊 داده‌ها: data/index.md
        - دوران‌ها:
          - سامانیان: data/eras/samanid.md
          - غزنویان: data/eras/ghaznavid.md
          - سلجوقیان: data/eras/seljuk.md
          - ایلخانیان: data/eras/ilkhanate.md
          - تیموریان: data/eras/timurid.md
          - صفویان: data/eras/safavid.md
        - شهرها:
          - بخارا: data/cities/bukhara.md
          - نیشابور: data/cities/nishapur.md
          - سمرقند: data/cities/samarkand.md
          - توس: data/cities/tus.md
          - بلخ: data/cities/balkh.md
          - شیراز: data/cities/shiraz.md
          - اصفهان: data/cities/isfahan.md
        - شاعران:
          - رودکی: data/poets/rudaki.md
          - دقیقی: data/poets/daqiqi.md
          - فردوسی: data/poets/ferdowsi.md
          - عطار: data/poets/attar.md
          - خیام: data/poets/khayyam.md
          - سعدی: data/poets/saadi.md
          - حافظ: data/poets/hafez.md
          - مولانا: data/poets/molana.md
          - جامی: data/poets/jami.md
          - صائب تبریزی: data/poets/saeb-tabrizi.md
  - ⚙️ فنی: technical/index.md
  - 📚 منابع: resources/index.md
  - 🔗 لینک‌های سریع:
      - نمایش زنده: https://chekameh.xyz
      - مخزن گیت‌هاب: https://github.com/MDaV05/PersianCultureMap

plugins:
  - search

markdown_extensions:
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: custom/46
      link: https://web.bale.ai/@FerdowsBaleBot
    - icon: fontawesome/brands/github
      link: https://github.com/MDaV05/PersianCultureMap
    - icon: material/web
      link: https://chekameh.xyz
    - icon: fontawesome/brands/telegram
      link: http://t.me/MDaV05

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/search-shortcut.js