site_name: "Chekameh — Persian Poetry Map"
site_url: "https://docs.chekameh.xyz"
site_description: "Interactive map and timeline of Persian poetry — explore poets, eras, and literary centers"
site_author: "Mohammad Davari & Contributors"
docs_dir: "docs"
site_dir: "site"
repo_url: "https://github.com/MDaV05/PersianCultureMap"
repo_name: "GitHub"

theme:
  name: material
  direction: auto
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: grey
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.tracking
    - navigation.tabs.sticky
    - navigation.path
    - navigation.expand
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.code.annotate
  font:
    text: Vazirmatn
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# Navigation - English only (i18n plugin handles Farsi)
nav:
  - 🏠 Home: index.md
  - 📊 Data:
      - Eras:
          - Samanid: data/eras/samanid.md
          - Ghaznavid: data/eras/ghaznavid.md
          - Seljuk: data/eras/seljuk.md
          - ilkhanate: data/eras/ilkhanate.md
          - timurid: data/eras/timurid.md
          - safavid: data/eras/safavid.md
      - Cities:
          - Bukhara: data/cities/bukhara.md
          - Nishapur: data/cities/nishapur.md
          - Samarkand: data/cities/samarkand.md
          - tus: data/cities/tus.md
          - balkh: data/cities/balkh.md
          - shiraz: data/cities/shiraz.md
          - isfahan: data/cities/isfahan.md
      - Poets:
          - Rudaki: data/poets/rudaki.md
          - daqiqi: data/poets/khayyam.md
          - Ferdowsi: data/poets/ferdowsi.md
          - Attar: data/poets/attar.md
          - Khayyam: data/poets/khayyam.md
          - saddi: data/poets/saadi.md
          - hafez: data/poets/hafez.md
          - molana: data/poets/molana.md
          - jami: data/poets/jami.md
          - saeb: data/poets/saeb-tabrizi.md
  - ⚙️ Technical: technical/index.md
  - 📚 Resources: resources/index.md
  - 🔗 Quick Links:
      - Live Demo: https://chekameh.xyz
      - GitHub Repo: https://github.com/MDaV05/PersianCultureMap

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fa
          name: فارسی
          build: true
          site_name: "چکامه — نقشه‌ی شعر پارسی"
          nav_translations:
            fa:
            # Eras
            Samanid: سامانیان
            Ghaznavid: غزنویان
            Seljuk: سلجوقیان
            Ilkhanate: ایلخانیان
            Timurid: تیموریان
            Safavid: صفویان
            
            # Cities
            Isfahan: اصفهان
            Shiraz: شیراز
            Balkh: بلخ
            Bukhara: بخارا
            Samarkand: سمرقند
            Nishapur: نیشابور
            Tus: توس
            
            # Poets
            Saadi: سعدی
            Hafez: حافظ
            Jami: جامی
            Molana: مولانا
            Rudaki: رودکی
            Daqiqi: دقیقی
            Saeb Tabrizi: صائب تبریزی
            Ferdowsi: فردوسی
            Khayyam: خیام
            Attar: عطار

            🏠 Home: 🏠 خانه
            📊 Data: 📊 داده‌ها
            Overview: نمای کلی
            Eras: دوران‌ها
            Cities: شهرها
            Poets: شاعران
            Divan-e-Rudaki: دیوان رودکی
            ⚙️ Technical: ⚙️ فنی
            📚 Resources: 📚 منابع
            🔗 Quick Links: 🔗 لینک‌های سریع
            Live Demo: نمایش زنده
            GitHub Repo: مخزن گیت‌هاب

markdown_extensions:
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MDaV05/PersianCultureMap
    - icon: material/web
      link: https://chekameh.xyz

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/search-shortcut.js